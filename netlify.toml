[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # These NEXT_PUBLIC_ vars are intentionally embedded in client-side JS by Next.js.
  # They are public keys (Supabase anon key is protected by RLS, not secrecy).
  # Tell Netlify's secrets scanner to skip them.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"
